<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEL Inbound Shipments</title>
<style>
  :root {
    --blue:     #1a56db;
    --blue-lt:  #e8f0fe;
    --green:    #0e7c4a;
    --green-lt: #d1fae5;
    --red:      #c81e1e;
    --red-lt:   #fee2e2;
    --amber:    #92400e;
    --amber-lt: #fef3c7;
    --gray-50:  #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --white:    #ffffff;
    --shadow:   0 1px 3px rgba(0,0,0,.12), 0 1px 2px rgba(0,0,0,.08);
    --radius:   8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    color: var(--gray-800);
    background: var(--gray-100);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  #topbar {
    background: var(--white);
    border-bottom: 2px solid #c8102e;   /* Gates red accent */
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }

  #topbar .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #topbar .logo-wrap img {
    height: 32px;
    width: auto;
    display: block;
  }

  #topbar .divider {
    width: 1px;
    height: 24px;
    background: var(--gray-200);
  }

  #topbar h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-800);
    white-space: nowrap;
    letter-spacing: -.01em;
  }

  .spacer { flex: 1; }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    white-space: nowrap;
  }
  .status-pill .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gray-400);
    flex-shrink: 0;
  }
  .status-pill.ok .dot    { background: #22c55e; }
  .status-pill.error .dot { background: var(--red); }

  #sync-info {
    font-size: 11px;
    color: var(--gray-400);
    white-space: nowrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--gray-200);
    background: var(--white);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-800);
    transition: opacity .15s;
    white-space: nowrap;
  }
  .btn:hover    { opacity: .8; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary  { background: var(--blue); color: var(--white); border-color: var(--blue); }

  /* ── Column header bar ── */
  #col-header {
    background: var(--gray-800);
    color: var(--white);
    display: flex;
    align-items: center;
    padding: 0 16px;
    height: 36px;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    gap: 0;
  }

  /* ── Board ── */
  #board {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;        /* no scrollbar — rows fill the space */
  }

  /* Empty / loading states */
  #board-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 10px;
    color: var(--gray-400);
    font-size: 14px;
  }
  #board-empty .icon { font-size: 40px; }

  /* ── Shipment rows — flex children that divide remaining height equally ── */
  .ship-row {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 16px;
    border-bottom: 1px solid var(--gray-200);
    flex: 1;                 /* each row claims equal share of #board height */
    min-height: 0;           /* allow flex items to shrink below content size */
    transition: background .1s;
    cursor: default;
  }
  .ship-row:hover { background: var(--blue-lt); }

  /* Row status stripe on left edge */
  .ship-row::before {
    content: '';
    width: 4px;
    border-radius: 2px;
    align-self: stretch;
    margin-left: -16px;
    margin-right: 12px;
    flex-shrink: 0;
  }
  .ship-row.status-overdue::before  { background: var(--red);   }
  .ship-row.status-today::before    { background: var(--green);  }
  .ship-row.status-soon::before     { background: var(--amber);  }
  .ship-row.status-upcoming::before { background: var(--blue);   }

  /* ── Column widths — mirror the FM list view screenshot ── */
  .col {
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    padding-right: 12px;
    font-size: 13px;
    flex-shrink: 0;
  }
  .col-arrival   { width: 14%; }
  .col-bol       { width: 14%; }
  .col-gelpo     { width: 13%; }
  .col-ticket    { width: 17%; }
  .col-carrier   { width: 18%; }
  .col-vendor    { width: 15%; }
  .col-logistics { flex: 1; }    /* takes remaining space */

  .col-arrival { font-weight: 600; }

  /* Date badge styling */
  .date-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-overdue  { background: var(--red-lt);   color: var(--red);   }
  .badge-today    { background: var(--green-lt); color: var(--green); }
  .badge-soon     { background: var(--amber-lt); color: var(--amber); }
  .badge-upcoming { background: var(--blue-lt);  color: var(--blue);  }

  /* ── Count badge in topbar ── */
  #record-count {
    font-size: 12px;
    font-weight: 600;
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    padding: 2px 10px;
    color: var(--gray-600);
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,.15);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Top bar ── -->
<div id="topbar">
  <div class="logo-wrap">
    <img src="/gates_logo.avif" alt="Gates Engineered Lubricants">
    <div class="divider"></div>
    <h1>Inbound Shipments</h1>
  </div>

  <div id="fm-pill" class="status-pill">
    <div class="dot"></div>
    <span>FileMaker…</span>
  </div>

  <span id="record-count">— shipments</span>

  <div class="spacer"></div>

  <span id="sync-info">—</span>
  <button class="btn btn-primary" id="btn-refresh" onclick="load(true)">↻ Refresh</button>
</div>

<!-- ── Column headers ── -->
<div id="col-header">
  <div class="col col-arrival">Expected Arrival</div>
  <div class="col col-bol">Bill of Lading</div>
  <div class="col col-gelpo">GEL PO #</div>
  <div class="col col-ticket">Inbound Ticket #</div>
  <div class="col col-carrier">Carrier</div>
  <div class="col col-vendor">Vendor</div>
  <div class="col col-logistics">Logistics Co.</div>
</div>

<!-- ── Board ── -->
<div id="board">
  <div id="board-empty">
    <div class="icon">⏳</div>
    <div>Loading shipments…</div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────────────────────
const REFRESH_MS = 90_000;   // auto-sync every 90 seconds
let   refreshTimer = null;

// ─────────────────────────────────────────────────────────────
// FM connection status
// ─────────────────────────────────────────────────────────────
async function checkFM() {
  try {
    const d = await api('/api/fm/status');
    setPill(d.connected, d.connected ? (d.database || 'GEL Sidekick') : (d.error || 'Error'));
  } catch (_) {
    setPill(false, 'Unreachable');
  }
}

function setPill(ok, text) {
  const p = document.getElementById('fm-pill');
  p.classList.toggle('ok',    ok);
  p.classList.toggle('error', !ok);
  p.querySelector('span').textContent = text;
}

// ─────────────────────────────────────────────────────────────
// Date helpers
// ─────────────────────────────────────────────────────────────

/**
 * Parse a FileMaker date string (M/D/YYYY) into a JS Date at noon local.
 * Returns null if unparseable.
 */
function parseFMDate(str) {
  if (!str) return null;
  // FM returns M/D/YYYY; also handle ISO just in case
  const iso = str.match(/^\d{4}-\d{2}-\d{2}/);
  if (iso) return new Date(str);
  const parts = str.split('/');
  if (parts.length !== 3) return null;
  const [m, d, y] = parts.map(Number);
  if (!m || !d || !y) return null;
  return new Date(y, m - 1, d, 12, 0, 0);
}

function formatDate(str) {
  const d = parseFMDate(str);
  if (!d) return str || '—';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

/**
 * Return the status of a shipment relative to today.
 * 'overdue' | 'today' | 'soon' (≤3 days) | 'upcoming'
 */
function arrivalStatus(str) {
  const d = parseFMDate(str);
  if (!d) return 'upcoming';
  const today = new Date(); today.setHours(0,0,0,0);
  const diff  = Math.round((d - today) / 86_400_000);  // days
  if (diff < 0)  return 'overdue';
  if (diff === 0) return 'today';
  if (diff <= 3)  return 'soon';
  return 'upcoming';
}

function badgeClass(status) {
  return { overdue: 'badge-overdue', today: 'badge-today',
           soon: 'badge-soon', upcoming: 'badge-upcoming' }[status] || 'badge-upcoming';
}

// ─────────────────────────────────────────────────────────────
// Fetch & render
// ─────────────────────────────────────────────────────────────
async function load(manual = false) {
  const btn   = document.getElementById('btn-refresh');
  const board = document.getElementById('board');
  const info  = document.getElementById('sync-info');
  const cnt   = document.getElementById('record-count');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Syncing…';

  try {
    const data = await api('/api/inbound-shipments');

    // Update count badge
    cnt.textContent = `${data.count} shipment${data.count !== 1 ? 's' : ''}`;

    // Update sync timestamp
    const syncTime = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    info.textContent = `Synced ${syncTime}  ·  ±30 days`;

    // Render rows
    board.innerHTML = '';

    if (!data.records || data.records.length === 0) {
      board.innerHTML = `
        <div id="board-empty">
          <div class="icon">✅</div>
          <div>No pending inbound shipments in the ±30-day window</div>
        </div>`;
      return;
    }

    data.records.forEach(r => {
      const status = arrivalStatus(r.expArrival);
      const row    = document.createElement('div');
      row.className = `ship-row status-${status}`;

      row.innerHTML = `
        <div class="col col-arrival">
          <span class="date-badge ${badgeClass(status)}">${formatDate(r.expArrival) || '—'}</span>
        </div>
        <div class="col col-bol">${esc(r.billOfLading)    || '—'}</div>
        <div class="col col-gelpo">${esc(r.gelPO)         || '—'}</div>
        <div class="col col-ticket">${esc(r.ticketNumber) || '—'}</div>
        <div class="col col-carrier">${esc(r.carrier)     || '—'}</div>
        <div class="col col-vendor">${esc(r.vendor)       || '—'}</div>
        <div class="col col-logistics">${esc(r.logisticsco) || '—'}</div>
      `;
      board.appendChild(row);
    });

  } catch (err) {
    board.innerHTML = `
      <div id="board-empty">
        <div class="icon">⚠️</div>
        <div style="color:var(--red)">Failed to load: ${esc(err.message)}</div>
      </div>`;
    cnt.textContent = '— shipments';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '↻ Refresh';

    // Reset the auto-refresh timer on every successful or manual load
    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(() => load(false), REFRESH_MS);
  }
}

// ─────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(path, { headers: { 'Content-Type': 'application/json' } });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────
checkFM();
load(true);
</script>
</body>
</html>
